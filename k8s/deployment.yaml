apiVersion: apps/v1
kind: Deployment
metadata:
  name: hexacore-api
  labels:
    app: hexacore-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hexacore-api
  template:
    metadata:
      labels:
        app: hexacore-api
    spec:
      containers:
      - name: hexacore-api
        image: hexacore-api:latest
        ports:
        - containerPort: 8000
        env:
        - name: HEXACORE_DB_URL
          valueFrom:
            secretKeyRef:
              name: hexacore-secrets
              key: db-url
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 1Gi
